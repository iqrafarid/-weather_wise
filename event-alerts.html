<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherWise</title>
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.css" rel="stylesheet">
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body and Global Styles */
    body {
      font-family: Arial, sans-serif;
      line-height: 1.6;
      background: linear-gradient(to bottom, #89BCE5, #D0E3FA);
      color: #333;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      margin: 0;
    }

    .content {
      flex: 1;
    }

    /* Back Button */
    .back-button {
      position: absolute;
      top: 20px;
      left: 20px;
      background: none;
      border: none;
      font-size: 32px;
      cursor: pointer;
      color: #0c45f1;
    }

    /* Event-Based Alerts Section */
    .event-alerts {
      text-align: center;
      margin: 2rem auto;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      max-width: 1200px;
      width: 90%;
    }

    .event-alerts h2 {
      color: #0c45f1 !important;
    }

    #calendar-container {
      max-width: 1200px;
      width: 100%;
      margin: 20px auto;
    }

    #calendar {
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 100%;
    }

    /* Change Date Numbers */
    .fc-daygrid-day-number {
      color: #0c45f1 !important;
      font-weight: bold;
    }

    /* Change Days of the Week (Mon, Tue, etc.) */
    .fc-col-header-cell .fc-scrollgrid-sync-inner {
      color: #0c45f1 !important;
      font-weight: bold;
    }

    /* Change Month & Year in the Header */
    .fc-toolbar-title {
      color: #0c45f1 !important;
      font-weight: bold;
    }

    /* Change Today's Date Background (Lighter Color) */
    .fc-day-today {
      background-color: #d6e3fc !important;
      color: white !important;
      border-radius: 5px;
    }

    /* Change Navigation Buttons (Next, Prev) */
    .fc-button {
      background-color: #0c45f1 !important;
      border: none !important;
      color: white !important;
      font-weight: bold;
    }

    .fc-button:hover {
      background-color: #092fad !important;
    }

    /* Weather Modal Styles */
    .weather-modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: white;
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      z-index: 1000;
      min-width: 300px;
    }

    .weather-modal h3 {
      color: #0c45f1;
      margin-bottom: 15px;
    }

    .weather-info {
      margin: 15px 0;
      padding: 10px;
      background: #f5f5f5;
      border-radius: 4px;
    }

    .modal-backdrop {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      z-index: 999;
    }

    .close-modal {
      position: absolute;
      top: 10px;
      right: 10px;
      background: none;
      border: none;
      font-size: 20px;
      cursor: pointer;
      color: #666;
    }

    .close-modal:hover {
      color: #0c45f1;
    }
  </style>
</head>
<body>
  <!-- Back Button -->
  <button class="back-button" onclick="window.location.href='homepage'">&#8592;</button>

  <!-- Event-Based Alerts Section -->
  <section class="event-alerts">
    <h2>Event-Based Weather Alerts</h2>
    <div id="calendar-container">
      <div id="calendar"></div>
    </div>
  </section>

  <!-- Weather Modal -->
  <div class="modal-backdrop" id="modalBackdrop"></div>
  <div class="weather-modal" id="weatherModal">
    <button class="close-modal" onclick="closeWeatherModal()">&times;</button>
    <h3>Event Weather Information</h3>
    <div class="weather-info" id="weatherInfo"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@5.11.3/main.min.js"></script>
  <script>
    // Function to show weather modal
    function showWeatherModal(weatherData) {
      const modal = document.getElementById('weatherModal');
      const backdrop = document.getElementById('modalBackdrop');
      const weatherInfo = document.getElementById('weatherInfo');
      
      weatherInfo.innerHTML = `
        <p><strong>Temperature:</strong> ${weatherData.temp}°C</p>
        <p><strong>Description:</strong> ${weatherData.description}</p>
        <p><strong>Humidity:</strong> ${weatherData.humidity}%</p>
        <p><strong>Wind Speed:</strong> ${weatherData.windSpeed} m/s</p>
      `;
      
      modal.style.display = 'block';
      backdrop.style.display = 'block';
    }

    // Function to close weather modal
    function closeWeatherModal() {
      const modal = document.getElementById('weatherModal');
      const backdrop = document.getElementById('modalBackdrop');
      modal.style.display = 'none';
      backdrop.style.display = 'none';
    }

    document.addEventListener('DOMContentLoaded', function () {
      let calendarEl = document.getElementById('calendar');
      if (!calendarEl) {
        console.error('Calendar element not found!');
        return;
      }
      
      let calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: 'dayGridMonth',
        selectable: true,
        editable: true,
        height: 650,
        events: '/get-events',
        eventClick: async function(info) {
          const destination = info.event.extendedProps.destination;
          if (destination) {
            try {
              const weatherResponse = await fetch(`/get-weather?destination=${encodeURIComponent(destination)}`);
              if (weatherResponse.ok) {
                const weatherData = await weatherResponse.json();
                showWeatherModal(weatherData);
              } else {
                alert('Weather information unavailable');
              }
            } catch (error) {
              console.error('Error fetching weather:', error);
              alert('Error fetching weather information');
            }
          }
        },
        dateClick: async function(info) {
          let title = prompt('Enter Event Title:');
          if (title) {
            let destination = prompt('Enter Event Destination:');
            if (destination) {
              let weatherInfo = '';
              try {
                const weatherResponse = await fetch(`/get-weather?destination=${encodeURIComponent(destination)}`);
                if (weatherResponse.ok) {
                  const weatherData = await weatherResponse.json();
                  weatherInfo = ` (${weatherData.description}, ${weatherData.temp}°C)`;
                }
              } catch (e) {
                weatherInfo = ' (Weather unavailable)';
              }
              try {
                const formData = new FormData();
                formData.append('title', title);
                formData.append('destination', destination);
                formData.append('event_date', info.dateStr);

                const response = await fetch('/add-event', {
                  method: 'POST',
                  body: formData
                });

                if (response.ok) {
                  calendar.addEvent({
                    title: `${title} - ${destination}${weatherInfo}`,
                    start: info.dateStr,
                    extendedProps: {
                      destination: destination
                    }
                  });
                } else {
                  alert('Failed to add event');
                }
              } catch (error) {
                console.error('Error adding event:', error);
                alert('Error adding event');
              }
            }
          }
        }
      });
      calendar.render();
    });
  </script>
</body>
</html>
