<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherWise - Login</title>
  <style>
    /* General Reset */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    /* Body Styling */
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom, #89BCE5, #D0E3FA); /* Corrected to use background */
    }

    /* Login Box */
    .login-container {
      background: linear-gradient(to bottom, #89BCE5, #D0E3FA);
      padding: 5rem; /* Increased padding */
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      width: 450px; /* Increased width */
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 1.5rem;
      color:   #0c45f1;
    }

    .login-container input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0;
      border-radius: 5px;
      border: 1px solid #ccc;
      outline: none;
    }

    .login-container button {
      width: 100%;
      padding: 0.8rem;
      background: #0c45f1;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      transition: background 0.3s;
    }

    .login-container button:hover {
      background: #2b80ff;
    }

    .login-container p {
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .login-container a {
      color:  #0c45f1;
      text-decoration: none;
    }
  </style>
</head>
<body>

  <!-- Login Form -->
  <div class="login-container">
    <h2>Login</h2>
    <form id="loginForm">
      <input type="text" name="username" placeholder="Username" required>
      <input type="password" name="password" placeholder="Password" required>
      <button type="submit">Login</button>
    </form>
    <p>Don't have an account? <a href="signup">Sign Up</a></p>
  </div>

  <script>
    document.getElementById("loginForm").addEventListener("submit", async function(event) {
      event.preventDefault();
      
      const formData = new FormData(event.target);
      
      try {
        const response = await fetch("/login", {
          method: "POST",
          body: formData,
          credentials: 'include'  // Important for cookies
        });
        
        const data = await response.json();
        
        if (response.ok) {
          alert("Login successful!");
          window.location.href = "/homepage";
        } else {
          alert(data.detail || "Login failed. Please try again.");
        }
      } catch (error) {
        console.error("Error:", error);
        alert("An error occurred. Please try again.");
      }
    });
  </script>
</body>
</html>
